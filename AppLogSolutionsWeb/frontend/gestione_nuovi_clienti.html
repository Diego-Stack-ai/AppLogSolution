<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Nuovi Clienti (Anomalie) - Log Solution</title>
    <link rel="stylesheet" href="styles.css?v=6.074">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        .list-container { 
            display: grid; gap: 16px; margin-top:20px; 
            max-height: 70vh; overflow-y: auto; padding-right: 12px;
        }
        .list-container::-webkit-scrollbar { width: 8px; }
        .list-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .list-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .data-card { border-left: 5px solid #3b82f6; }
        
        .contatto-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) 40px;
            gap: 10px;
            align-items: center;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <button onclick="window.history.back()" class="logout-btn" style="border:none; background:none; cursor:pointer; margin-right:8px; display:flex;">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <div class="nav-title" style="flex: 1;">Gestione Nuovi Clienti (Anomalie)</div>
            <a href="#" onclick="window.logoutFirebase(); return false;" class="logout-btn" title="Esci"><span class="material-icons-round">logout</span></a>
        </div>
    </nav>

    <main class="main-container">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Cerca..." style="flex:1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <button class="btn-primary" onclick="openModal()" style="border-radius: 12px; padding: 0 20px;">+ Nuovo</button>
        </div>
        <div id="loadingIndicator">Caricamento in corso...</div>
        <div id="dataContainer" class="list-container"></div>
    </main>

    <!-- Modal Form -->
    <div id="dataModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-bottom: 20px;">Gestione Nuovi Clienti (Anomalie)</h3>
            <form id="dataForm" class="modal-body" style="display: grid; gap: 15px;">
                <input type="hidden" id="editId">
                <div id="dynamicFields" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
                
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4 style="font-size:14px; font-weight:bold; color:var(--primary); text-transform:uppercase; margin: 0;">Contatti del Cliente</h4>
                    <button type="button" class="btn-primary" onclick="addContattoRow()" style="background:#10b981; font-size:12px; padding:6px 12px; border-radius: 8px;">+ Aggiungi</button>
                </div>
                
                <div id="contattiContainer" style="display: grid; gap: 12px;"></div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="flex: 2;">Salva</button>
                    <button type="button" onclick="closeModal()" class="btn-primary" style="flex: 1; background: #f1f5f9; color: #64748b; box-shadow: none;">Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-config.js";
        const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);

        const db = getFirestore(app);
        const auth = getAuth(app);

        const COLL_PATH = ['customers', 'DNR', 'gestione_nuovi_clienti'];
        const FIELDS = ['Codice Frutta', 'Codice Latte', 'A chi va consegnato', 'Indirizzo', 'CAP', 'Città', 'Provincia', 'Orario min', 'Orario max', 'Tipologia consegna'];
        let items = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, ...COLL_PATH), (snapshot) => {
                    items = [];
                    snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));
                    document.getElementById('loadingIndicator').style.display = 'none';
                    renderTable();
                }, (error) => {
                    console.error("Errore snapshot contatti clienti:", error);
                    document.getElementById('loadingIndicator').textContent = "Errore permessi di lettura Firestore.";
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('searchInput').addEventListener('input', renderTable);

        function renderTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = items.filter(i => JSON.stringify(i).toLowerCase().includes(q));
            
            const html = filtered.map(item => {
                let details = '';
                FIELDS.forEach(f => {
                    const val = item[f] || '';
                    if (val) details += `<div style="font-size:13px; color:#475569; margin-bottom: 2px;"><b>${f}:</b> ${val}</div>`;
                });
                
                // Rendering della lista dei contatti ad azione rapida
                if (item.contatti && item.contatti.length > 0) {
                    details += '<div style="margin-top:12px; border-top:1px dashed #cbd5e1; padding-top:10px; font-weight:bold; font-size:13px; color:#1e293b;">Elenco Contatti:</div>';
                    item.contatti.forEach(c => {
                        let waNumber = (c.cellulare || '').replace(/[^0-9]/g, '');
                        if (waNumber.length === 10 && waNumber.startsWith('3')) {
                            waNumber = '39' + waNumber;
                        }
                        
                        details += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; padding:8px 12px; border-radius:10px; margin-top:6px; border:1px solid #e2e8f0;">
                            <div style="font-size:12px; flex: 1;">
                                <div style="font-weight:bold; color:#1e293b;">
                                    ${c.nome} ${c.cognome} 
                                    ${c.fatturazione ? '<span style="font-size:9px; background:#dbeafe; color:#1e40af; padding:1px 6px; border-radius:10px; font-weight:bold; margin-left:5px; border:1px solid #bfdbfe;">Fatturazione</span>' : ''}
                                </div>
                                <div style="color:#64748b; font-size:11px; margin-top:2px;">
                                    ${c.email ? `✉️ ${c.email}` : ''} 
                                    ${c.cellulare ? ` 📱 ${c.cellulare}` : ''} 
                                    ${c.fisso ? ` 📞 ${c.fisso}` : ''}
                                </div>
                            </div>
                            <div style="display:flex; gap:6px;">
                                ${(c.cellulare || c.fisso) ? `<a href="tel:${c.cellulare || c.fisso}" class="quick-action-btn" style="display:flex; align-items:center; justify-content:center; background:#2563eb; color:white; width:26px; height:26px; border-radius:50%; text-decoration:none;" title="Chiama"><span class="material-icons-round" style="font-size:14px;">phone</span></a>` : ''}
                                ${c.email ? `<a href="mailto:${c.email}" class="quick-action-btn" style="display:flex; align-items:center; justify-content:center; background:#475569; color:white; width:26px; height:26px; border-radius:50%; text-decoration:none;" title="Scrivi Email"><span class="material-icons-round" style="font-size:14px;">email</span></a>` : ''}
                                ${c.cellulare ? `<a href="https://wa.me/${waNumber}" target="_blank" class="quick-action-btn" style="display:flex; align-items:center; justify-content:center; background:#16a34a; color:white; width:26px; height:26px; border-radius:50%; text-decoration:none;" title="Apri WhatsApp"><svg style="width:12px; height:12px; fill:currentColor;" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.419 5.422 0 12.008 0c3.193.001 6.195 1.242 8.455 3.499 2.26 2.259 3.5 5.259 3.497 8.496-.003 6.58-5.425 12-12.01 12-2.002-.001-3.97-.502-5.713-1.458L0 24zm6.59-2.835c1.6.95 2.766 1.498 4.795 1.499 5.485.002 9.948-4.509 9.95-10.051.002-2.685-1.036-5.207-2.923-7.094C16.536 3.633 14.032 2.59 11.35 2.59c-5.49 0-9.954 4.512-9.957 10.056-.002 2.052.518 3.23 1.499 4.887L1.888 21.54l4.759-1.375z"/></svg></a>` : ''}
                            </div>
                        </div>
                        `;
                    });
                }

                return `
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between;">
                        <div style="flex:1;">${details}</div>
                        <div style="display:flex; gap:10px; flex-direction:column; justify-content: flex-start; margin-left: 15px;">
                            <button onclick="editItem('${item.id}')" style="background:#4f46e5; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;" title="Modifica"><span class="material-icons-round" style="font-size: 16px;">edit</span></button>
                            <button onclick="deleteItem('${item.id}')" style="background:#ef4444; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;" title="Elimina"><span class="material-icons-round" style="font-size: 16px;">delete</span></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('dataContainer').innerHTML = html || '<div style="padding: 20px; color: #64748b;">Nessun dato.</div>';
        }

        window.openModal = function() {
            document.getElementById('editId').value = '';
            document.getElementById('dataForm').reset();
            buildFields({});
            window.activeContatti = [];
            renderContattiForm();
            document.getElementById('dataModal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('dataModal').classList.remove('active');
        }

        window.editItem = function(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('editId').value = id;
            buildFields(item);
            window.activeContatti = item.contatti ? JSON.parse(JSON.stringify(item.contatti)) : [];
            renderContattiForm();
            document.getElementById('dataModal').classList.add('active');
        }

        window.deleteItem = async function(id) {
            if(confirm('Eliminare questo elemento?')) {
                await deleteDoc(doc(db, ...COLL_PATH, id));
            }
        }

        function buildFields(item) {
            const container = document.getElementById('dynamicFields');
            let html = '';
            FIELDS.forEach(f => {
                const val = item[f] || '';
                const fieldId = 'f_' + f.replace(/[^a-zA-Z0-9]/g, '_');
                html += `
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:11px; font-weight:bold; color:#475569; text-transform:uppercase;">${f}</label>
                    <input type="text" id="${fieldId}" value="${val}" style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px;">
                </div>`;
            });
            container.innerHTML = html;
        }

        // --- GESTIONE CONTATTI DINAMICI ---
        window.activeContatti = [];

        window.addContattoRow = function() {
            window.activeContatti.push({ nome: '', cognome: '', email: '', cellulare: '', fisso: '', fatturazione: false });
            renderContattiForm();
        }

        window.removeContattoRow = function(idx) {
            // Sincronizza i valori attuali della UI prima di rimuovere la riga
            syncContattiFromInputs();
            window.activeContatti.splice(idx, 1);
            renderContattiForm();
        }

        function syncContattiFromInputs() {
            const container = document.getElementById('contattiContainer');
            const rows = container.querySelectorAll('.contatto-row');
            rows.forEach((row, idx) => {
                if (window.activeContatti[idx]) {
                    window.activeContatti[idx].nome = row.querySelector('.c-nome').value.trim();
                    window.activeContatti[idx].cognome = row.querySelector('.c-cognome').value.trim();
                    window.activeContatti[idx].email = row.querySelector('.c-email').value.trim();
                    window.activeContatti[idx].cellulare = row.querySelector('.c-cellulare').value.trim();
                    window.activeContatti[idx].fisso = row.querySelector('.c-fisso').value.trim();
                    window.activeContatti[idx].fatturazione = row.querySelector('.c-fatturazione').checked;
                }
            });
        }

        function renderContattiForm() {
            const container = document.getElementById('contattiContainer');
            if (window.activeContatti.length === 0) {
                container.innerHTML = '<div style="font-size:13px; color:#94a3b8; text-align:center; padding:10px;">Nessun contatto inserito. Premi + Aggiungi.</div>';
                return;
            }

            let html = '';
            window.activeContatti.forEach((c, idx) => {
                html += `
                <div class="contatto-row" data-index="${idx}">
                    <input type="text" placeholder="Nome" class="c-nome" value="${c.nome || ''}" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; font-size:13px;">
                    <input type="text" placeholder="Cognome" class="c-cognome" value="${c.cognome || ''}" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; font-size:13px;">
                    <input type="email" placeholder="Email" class="c-email" value="${c.email || ''}" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; font-size:13px;">
                    <input type="text" placeholder="Cellulare" class="c-cellulare" value="${c.cellulare || ''}" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; font-size:13px;">
                    <input type="text" placeholder="Fisso" class="c-fisso" value="${c.fisso || ''}" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; font-size:13px;">
                    <label style="display:flex; align-items:center; gap:5px; font-size:11px; color:#475569; user-select:none; cursor:pointer;">
                        <input type="checkbox" class="c-fatturazione" ${c.fatturazione ? 'checked' : ''} style="cursor:pointer;">
                        Fatturaz.
                    </label>
                    <button type="button" onclick="removeContattoRow(${idx})" style="background:#ef4444; color:white; border:none; padding:8px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center;" title="Rimuovi"><span class="material-icons-round" style="font-size:16px;">delete</span></button>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            // Sincronizza ed estrae i contatti inseriti
            syncContattiFromInputs();
            const contattiValidi = window.activeContatti.filter(c => c.nome || c.cognome || c.email || c.cellulare || c.fisso);

            const data = {};
            FIELDS.forEach(f => { 
                data[f] = document.getElementById('f_'+f.replace(/[^a-zA-Z0-9]/g, '_')).value; 
            });
            data.contatti = contattiValidi;

            if(id) {
                await setDoc(doc(db, ...COLL_PATH, id), data, { merge: true });
            } else {
                await addDoc(collection(db, ...COLL_PATH), data);
            }
            closeModal();
        });
    </script>
</body>
</html>
