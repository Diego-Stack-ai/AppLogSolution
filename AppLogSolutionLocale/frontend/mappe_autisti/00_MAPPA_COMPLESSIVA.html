    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --bg-dark: #0f172a;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg-dark); overflow: hidden; }
        #map { height: 100%; width: 100%; background: #dfe5eb; position: relative; }
        
        .floating-header {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 10px 16px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.15);
            transition: all 0.3s;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            color: #0f172a;
        }

        .header-subtitle {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-badge {
            font-size: 0.72rem;
            font-weight: 800;
            background: var(--primary-glow);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 20px;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        .stats-badge {
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
        }

        .selector-container select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            background: white;
            outline: none;
            cursor: pointer;
        }

        /* Custom Marker shapes in Map */
        .custom-marker {
            position: absolute;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid white;
            transition: 0.2s;
            transform: translate(-50%, -100%);
        }
        .m-tonda { border-radius: 50%; }
        .m-goccia { border-radius: 50% 50% 50% 0; transform: rotate(-45deg); }
        .m-goccia span { transform: rotate(45deg); }
        .m-quadrato { border-radius: 4px; }
        .m-triangolo {
            background: transparent !important;
            border-left: 17px solid transparent;
            border-right: 17px solid transparent;
            border-bottom: 34px solid #ccc;
            width: 0 !important;
            height: 0 !important;
            border-radius: 0;
            box-shadow: none;
            border-top: none;
        }
        .m-triangolo span { position: absolute; top: 15px; left: -8px; width: 16px; }

        @media (max-width: 768px) {
            .floating-header {
                top: 0;
                left: 0;
                right: 0;
                border-radius: 0;
                border-bottom: 1px solid rgba(15, 23, 42, 0.08);
                padding: 8px 12px;
                gap: 8px;
                width: 100%;
                box-sizing: border-box;
            }
            .selector-container {
                width: 100%;
            }
            .selector-container select {
                width: 100%;
            }
        }
    </style>

                        const decoded = google.maps.geometry.encoding.decodePath(encodedPath);

                            strokeColor: color,
                            strokeOpacity: 0.75,
