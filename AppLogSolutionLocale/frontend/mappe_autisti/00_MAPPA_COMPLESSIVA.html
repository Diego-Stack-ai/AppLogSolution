    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --bg-dark: #0f172a;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg-dark); overflow: hidden; }
        #map { height: 100%; width: 100%; background: #dfe5eb; position: relative; }
        
        .floating-header {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 10px 16px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.15);
            transition: all 0.3s;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            color: #0f172a;
        }

        .header-subtitle {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-badge {
            font-size: 0.72rem;
            font-weight: 800;
            background: var(--primary-glow);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 20px;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        .stats-badge {
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
        }

        .selector-container select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            background: white;
            outline: none;
            cursor: pointer;
        }

        /* Custom Marker shapes in Map */
        .custom-marker {
            position: absolute;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid white;
            transition: 0.2s;
            transform: translate(-50%, -100%);
        }
        .m-tonda { border-radius: 50%; }
        .m-goccia { border-radius: 50% 50% 50% 0; transform: rotate(-45deg); }
        .m-goccia span { transform: rotate(45deg); }
        .m-quadrato { border-radius: 4px; }
        .m-triangolo {
            background: transparent !important;
            border-left: 17px solid transparent;
            border-right: 17px solid transparent;
            border-bottom: 34px solid #ccc;
            width: 0 !important;
            height: 0 !important;
            border-radius: 0;
            box-shadow: none;
            border-top: none;
        }
        .m-triangolo span { position: absolute; top: 15px; left: -8px; width: 16px; }

        @media (max-width: 768px) {
            .floating-header {
                top: 0;
                left: 0;
                right: 0;
                border-radius: 0;
                border-bottom: 1px solid rgba(15, 23, 42, 0.08);
                padding: 8px 12px;
                gap: 8px;
                width: 100%;
                box-sizing: border-box;
            }
            .selector-container {
                width: 100%;
            }
            .selector-container select {
                width: 100%;
            }
        }
    </style>

        let map, infoWindow;
        let allMarkers = [];

        let voyageMap = {};

        async function initMap() {
            const centerPoint = { lat: 45.4428, lng: 11.7145 }; // DEPOT VEGGIANO
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 10,
                center: centerPoint,
                mapId: "LOG_SOLUTION_MASTER_MAP",
                disableDefaultUI: true,
                zoomControl: true,
                streetViewControl: true
            });
            infoWindow = new google.maps.InfoWindow();

            renderAll();
        }

        function renderAll() {
            const selectEl = document.getElementById('giro-select');
            let totalFermate = 0;
            const coordCounts = {};

            viaggi.forEach((v, idx) => {
                const v_id = v.v_id;
                const color = v.color;
                const list = v.lista_punti || [];
                totalFermate += list.length;

                // Add option
                const opt = document.createElement('option');
                opt.value = v_id;
                opt.textContent = `🏎️ Giro ${v_id} (${list.length} fermate)`;
                selectEl.appendChild(opt);

                voyageMap[v_id] = { markers: [], polylines: [] };

                // Disegna polylines reali se presenti
                if (v.polylines && v.polylines.length > 0) {
                    v.polylines.forEach(encodedPath => {
                        const decoded = google.maps.geometry.encoding.decodePath(encodedPath);
                        const poly = new google.maps.Polyline({
                            path: decoded,
                            strokeColor: color,
                            strokeOpacity: 0.75,
                            strokeWeight: 5,
                            map: map
                        });
                        allPolylines.push(poly);
                        voyageMap[v_id].polylines.push(poly);
                    });
                }

                // Disegna marker
                list.forEach((p, pIdx) => {
                    if (!p.lat || !p.lon) return;
                    const lat = parseFloat(p.lat);
                    const lon = parseFloat(p.lon);
                    const position = { lat, lng: lon };

                    const key = `${lat.toFixed(6)}_${lon.toFixed(6)}`;
                    coordCounts[key] = (coordCounts[key] || 0) + 1;
                    const layer = coordCounts[key];

                    let shape = 'm-goccia';
                    if (layer === 2) shape = 'm-quadrato';
                    else if (layer === 3) shape = 'm-triangolo';
                    else if (layer > 3) shape = 'm-tonda';

                    const t_g = (p.tipologia_grado || '').toUpperCase();
                    const isGrandChef = (p.codice_frutta && (p.codice_frutta.startsWith('100') || p.codice_frutta.length > 6)) || t_g.includes('GRAND CHEF') || t_g.includes('GRAN CHEF');
                    const isCattell = t_g.includes('CATTELL') || t_g.includes('CATTEL') || (p.codice_frutta && p.codice_frutta.toUpperCase().includes('CATTELL'));
                    const isBauer = t_g.includes('BAUER') || (p.codice_frutta && p.codice_frutta.toUpperCase().includes('BAUER'));

                    const el = document.createElement("div");
                    if (isGrandChef || isCattell || isBauer) {
                        let emoji = '👨‍🍳';
                        if (isCattell) emoji = '🍴';
                        else if (isBauer) emoji = '🍳';

                        el.className = `custom-marker m-chef`;
                        el.style.backgroundColor = color;
                        el.style.borderRadius = "50%";
                        el.style.width = "34px";
                        el.style.height = "34px";
                        el.style.border = "2px solid white";
                        el.style.display = "flex";
                        el.style.flexDirection = "column";
                        el.style.alignItems = "center";
                        el.style.justifyContent = "center";
                        el.style.transform = "translate(-50%, -100%)";
                        el.innerHTML = `
                            <span style="font-size: 13px; line-height: 1.1; margin-top: -1px; pointer-events: none; display: block;">${emoji}</span>
                            <span style="font-size: 8px; font-weight: 900; pointer-events: none; margin-top: -2px; display: block;">${pIdx + 1}</span>
                        `;
                    } else {
                        el.className = `custom-marker ${shape}`;
                        if (shape === 'm-triangolo') {
                            el.style.borderBottomColor = color;
                        } else {
                            el.style.backgroundColor = color;
                        }
                        el.innerHTML = `<span style="pointer-events: none;">${pIdx + 1}</span>`;
                    }

                      // Use new AdvancedMarkerElement if available
                      let m;
                      if (google.maps.marker && google.maps.marker.AdvancedMarkerElement) {
                          m = new google.maps.marker.AdvancedMarkerElement({
                              position: position,
                              map: map,
                              title: p.nome,
                              content: el
                          });
                      } else {
                          m = new google.maps.Marker({
                              position: position,
                              map: map,
                              title: p.nome,
                              label: { text: (pIdx+1).toString(), color: "white", fontSize: "10px", fontWeight: "900" }
                          });
                      }

                      m.addListener(m.content ? "gmp-click" : "click", () => {
                          const ddtListText = [...(p.codici_ddt_frutta || []), ...(p.codici_ddt_latte || [])].join(', ');
                          const contentHtml = `

                                  <div style="font-weight:800; font-size:13px; color:#0f172a; margin-bottom:4px;">${p.nome}</div>

                  });
              });

              document.getElementById('stats-summary').textContent = `${totalFermate} Fermate | ${viaggi.length} Viaggi`;

              if (allMarkers.length > 0) {
                  fitAll();
              }
          }

          function fitAll() {
              let bounds = new google.maps.LatLngBounds();
              allMarkers.forEach(m => bounds.extend(m.position || m.getPosition()));
              map.fitBounds(bounds);
          }

          window.filterGiro = function(selectedVid) {
              infoWindow.close();
              if (selectedVid === "ALL") {
                  allMarkers.forEach(m => m.setMap(map));
                  allPolylines.forEach(p => p.setMap(map));
                  fitAll();
                  return;
              }

              Object.keys(voyageMap).forEach(vid => {
                  const show = (vid === selectedVid);
                  voyageMap[vid].markers.forEach(m => m.setMap(show ? map : null));
                  voyageMap[vid].polylines.forEach(p => p.setMap(show ? map : null));
              });

              const active = voyageMap[selectedVid]?.markers || [];
              if (active.length > 0) {
                  let bounds = new google.maps.LatLngBounds();
                  active.forEach(m => bounds.extend(m.position || m.getPosition()));
                  map.fitBounds(bounds);
              }
          };
