<!DOCTYPE html><html><head><title>Mappa Google Directions 04/03/2026</title><meta charset='utf-8'><script src='https://maps.googleapis.com/maps/api/js?key=AIzaSyAHQ3HjuEEIS8bn5KMh6N3UoM6kZ2MYGL4'></script>
            <style>body,html{height:100%;margin:0;font-family:sans-serif;background:#eff6ff;}#map{height:100%;width:100%;position:fixed;}#side{position:absolute;top:10px;left:10px;width:320px;background:white;padding:15px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.3);z-index:100;max-height:90vh;overflow-y:auto;}.card{border:2px solid #eee;border-radius:12px;padding:12px;margin-bottom:12px;cursor:pointer;}.active-card{border-color:#4f46e5;background:#f0f3ff;}.wa-btn{display:block;background:#3b82f6;color:white;text-align:center;padding:10px;border-radius:10px;font-weight:800;text-decoration:none;margin-top:10px;}</style>
            </head><body><div id='side'><h2 style='color:#4f46e5;margin:0;'>Log Solution</h2><p style='font-size:0.8rem;color:grey;'>Ottimizzazione Nativa Google - 04/03/2026</p><div id='cards'></div></div><div id='map'></div><script>
            const trips=[{"id": "BL 1", "stops": [{"nome": "RISTORANTE AURORA", "indirizzo": "VIA GIUSEPPE GARIBALDI 68, FELTRE BL", "lat": 46.0155626, "lng": 11.9078378}, {"nome": "OSTERIA PANEVIN", "indirizzo": "VIA CART 16, FELTRE BL", "lat": 46.0409489, "lng": 11.9351217}, {"nome": "MACELLERIA COSTA", "indirizzo": "PIAZZA PAPA LUCIANI 49, CANALE D AGORDO BL", "lat": 46.36030359999999, "lng": 11.9149167}], "km_str": "363.0 km calcolati", "wa": "https://www.google.com/maps/dir/?api=1&origin=Via%20alessandro%20volta%2C%2025/a%2C%2035030%20Veggiano%20PD&destination=Via%20alessandro%20volta%2C%2025/a%2C%2035030%20Veggiano%20PD&waypoints=VIA%20GIUSEPPE%20GARIBALDI%2068%2C%20FELTRE%20BL|VIA%20CART%2016%2C%20FELTRE%20BL|PIAZZA%20PAPA%20LUCIANI%2049%2C%20CANALE%20D%20AGORDO%20BL&travelmode=driving"}, {"id": "VR", "stops": [{"nome": "VILLA BALIS CREMA", "indirizzo": "VIA BELVEDERE 1, ROMAGNANO DI GREZZANA VR", "lat": 45.5232807, "lng": 11.0399312}, {"nome": "DUE TORRI HOTEL - VERONA", "indirizzo": "PIAZZA S. ANASTASIA 4, VERONA VR", "lat": 45.44499709999999, "lng": 10.999457}, {"nome": "CAMPIDOGLIO BISTRO' S.R.L.", "indirizzo": "PIAZZETTA TIRABOSCO 4, VERONA VR", "lat": 45.4428206, "lng": 10.9963042}, {"nome": "CASA PERBELLINI", "indirizzo": "VIA CORTICELLA SAN MARCO 3, VERONA VR", "lat": 45.4426523, "lng": 10.9961132}, {"nome": "TAPASOTTO S.R.L.", "indirizzo": "GALLERIA PELLICIANI 12, VERONA VR", "lat": 45.441779, "lng": 10.9949361}, {"nome": "VISTA PALAZZO VERONA", "indirizzo": "VIA CORTICELLA LEONI 3, VERONA VR", "lat": 45.4406934, "lng": 11.0000006}, {"nome": "S.BASILIO-ALLA PERGOLA SRL TRATTORIA", "indirizzo": "VIA ANTONIO PISANO, 9, VERONA VR", "lat": 45.4407117, "lng": 11.0201365}, {"nome": "CASA MOLON AL GOLF VERONA", "indirizzo": "LOC. VIA DA DEL SALE 15, SOMMACAMPAGNA VR", "lat": 45.4054199, "lng": 10.8446659}, {"nome": "HOTEL DEVILLE", "indirizzo": "VIA PAUL 4, COSTERMANO SUL GARDA VR", "lat": 45.58959919999999, "lng": 10.7113201}, {"nome": "MARGESIN HOTEL", "indirizzo": "LOCALITA  LE SORTE, TORRI DEL BENACO VR", "lat": 45.6002441, "lng": 10.6956753}], "km_str": "274.7 km calcolati", "wa": "https://www.google.com/maps/dir/?api=1&origin=Via%20alessandro%20volta%2C%2025/a%2C%2035030%20Veggiano%20PD&destination=Via%20alessandro%20volta%2C%2025/a%2C%2035030%20Veggiano%20PD&waypoints=VIA%20BELVEDERE%201%2C%20ROMAGNANO%20DI%20GREZZANA%20VR|PIAZZA%20S.%20ANASTASIA%204%2C%20VERONA%20VR|PIAZZETTA%20TIRABOSCO%204%2C%20VERONA%20VR|VIA%20CORTICELLA%20SAN%20MARCO%203%2C%20VERONA%20VR|GALLERIA%20PELLICIANI%2012%2C%20VERONA%20VR|VIA%20CORTICELLA%20LEONI%203%2C%20VERONA%20VR|VIA%20ANTONIO%20PISANO%2C%209%2C%20VERONA%20VR|LOC.%20VIA%20DA%20DEL%20SALE%2015%2C%20SOMMACAMPAGNA%20VR|VIA%20PAUL%204%2C%20COSTERMANO%20SUL%20GARDA%20VR|LOCALITA%20%20LE%20SORTE%2C%20TORRI%20DEL%20BENACO%20VR&travelmode=driving"}];
            let map, ds, dr, markers=[];
            function initMap(){
                map=new google.maps.Map(document.getElementById('map'),{center:{lat:45.8,lng:12.1},zoom:9});
                ds=new google.maps.DirectionsService(); dr=new google.maps.DirectionsRenderer({map:map, suppressMarkers:true});
                trips.forEach((t,i)=>{
                    const card=document.createElement('div'); card.className='card'; card.id='card-'+i;
                    card.innerHTML=`<b>Furgone: ${t.id}</b><div id='km-${i}' style='font-weight:bold;color:#16a34a;margin:5px 0;'>${t.km_str}</div><div style='font-size:0.75rem;color:grey;'>${t.stops.map((s,idx)=>(idx+1)+'. '+s.nome).join('<br>')}</div><a href="${t.wa}" target="_blank" class='wa-btn'>Avvia Navigatore WhatsApp</a>`;
                    card.onclick=()=>selectTrip(i); document.getElementById('cards').appendChild(card);
                });
                if(trips.length > 0) selectTrip(0);
            }
            function selectTrip(idx){
                document.querySelectorAll('.card').forEach(el=>el.classList.remove('active-card')); document.getElementById('card-'+idx).classList.add('active-card');
                const t=trips[idx]; markers.forEach(m=>m.setMap(null)); markers=[];
                markers.push(new google.maps.Marker({position:{lat:45.442805,lng:11.714498}, map:map, label:'H'}));
                t.stops.forEach((s, i) => { markers.push(new google.maps.Marker({position: {lat:s.lat, lng:s.lng}, map:map, label: (i+1).toString()})); });
                // CHIAVE: optimizeWaypoints ORA È FALSE PERCHE' I PUNTI SONO GIA' ORDINATI E DEVONO ESSERE RISPETTATI
                ds.route({origin:'Via alessandro volta, 25/a, 35030 Veggiano PD',destination:'Via alessandro volta, 25/a, 35030 Veggiano PD',waypoints:t.stops.map(s=>({location:new google.maps.LatLng(s.lat,s.lng),stopover:true})),travelMode:'DRIVING',optimizeWaypoints:false},(res,stat)=>{ if(stat==='OK') dr.setDirections(res); });
            }google.maps.event.addDomListener(window,'load',initMap);</script></body></html>
