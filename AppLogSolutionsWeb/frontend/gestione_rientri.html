<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rientri DDT - Log Solution</title>
    <link rel="stylesheet" href="styles.css?v=6.179">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        .list-container {
            display: grid;
            gap: 14px;
            margin-top: 20px;
            max-height: 72vh;
            overflow-y: auto;
            padding-right: 12px;
        }
        .list-container::-webkit-scrollbar { width: 8px; }
        .list-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .list-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .rientro-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 20px;
            border-left: 5px solid #d946ef;
            transition: box-shadow 0.2s;
        }
        .rientro-card.parziale {
            border-left-color: #f59e0b;
        }
        .rientro-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }
        .card-codice {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }
        .card-ddt {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }
        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .badge-stato {
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
        }
        .badge-parziale {
            background: #fef3c7;
            color: #92400e;
        }
        .card-note {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px 14px;
            border-left: 3px solid #e2e8f0;
            line-height: 1.5;
        }
        .card-note .note-label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            flex-direction: column;
            flex-shrink: 0;
        }
        .btn-icon {
            border: none;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }
        .btn-icon:hover { opacity: 0.8; }
        .btn-edit  { background: #4f46e5; color: white; }
        .btn-del   { background: #ef4444; color: white; }

        /* Modal campo Note più alto */
        #f_Note { min-height: 80px; resize: vertical; }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <button onclick="window.history.back()" class="logout-btn" style="border:none; background:none; cursor:pointer; margin-right:8px; display:flex;">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <div class="nav-title" style="flex: 1;">Rientri DDT</div>
            <a href="#" onclick="window.logoutFirebase(); return false;" class="logout-btn" title="Esci"><span class="material-icons-round">logout</span></a>
        </div>
    </nav>

    <main class="main-container">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Cerca codice, DDT, note..." style="flex:1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <button class="btn-primary" onclick="openModal()" style="border-radius: 12px; padding: 0 20px;">+ Nuovo</button>
        </div>
        <div id="loadingIndicator" style="color:#64748b; padding:20px;">Caricamento...</div>
        <div id="dataContainer" class="list-container"></div>
    </main>

    <!-- Modal Form -->
    <div id="dataModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Rientro DDT</h3>
            <form id="dataForm" class="modal-body" style="display: grid; gap: 15px;">
                <input type="hidden" id="editId">

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:12px; font-weight:bold; color:var(--primary); text-transform:uppercase;">Codice consegna</label>
                    <input type="text" id="f_Codice_consegna" placeholder="es. P1892" style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px;">
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:12px; font-weight:bold; color:var(--primary); text-transform:uppercase;">Data e Num DDT</label>
                    <input type="text" id="f_Data_e_Num_DDT" placeholder="es. 04-05-2026_FNS13400" style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px;">
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:12px; font-weight:bold; color:var(--primary); text-transform:uppercase;">Stato allegato</label>
                    <input type="text" id="f_Stato" placeholder="es. allegato DDT 11-05-2026" style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px;">
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:12px; font-weight:bold; color:var(--primary); text-transform:uppercase;">Tipo</label>
                    <select id="f_Tipo" style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px; background:white;">
                        <option value=""> completo </option>
                        <option value="parziale">parziale</option>
                    </select>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:12px; font-weight:bold; color:var(--primary); text-transform:uppercase;">Note</label>
                    <textarea id="f_Note" placeholder="Dettagli da consegnare / ritirare..." style="padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px; font-family:inherit;"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" class="btn-primary" style="flex: 2;">Salva</button>
                    <button type="button" onclick="closeModal()" class="btn-primary" style="flex: 1; background: #f1f5f9; color: #64748b; box-shadow: none;">Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);

const db  = getFirestore(app);

        // ? PATH CORRETTO
        const COLL_PATH = ['clienti', 'DNR', 'rientri ddt'];
        let items = [];

        onSnapshot(collection(db, ...COLL_PATH), (snapshot) => {
            items = [];
            snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));
            document.getElementById('loadingIndicator').style.display = 'none';
            renderList();
        });

        document.getElementById('searchInput').addEventListener('input', renderList);

        window.renderList = function() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = items.filter(i => JSON.stringify(i).toLowerCase().includes(q));

            if (!filtered.length) {
                document.getElementById('dataContainer').innerHTML = '<div style="padding:20px; color:#64748b;">Nessun rientro trovato.</div>';
                return;
            }

            const html = filtered.map(item => {
                const codice = item['Codice consegna'] || '';
                const ddt    = item['Data e Num DDT']  || '';
                const stato  = item['Stato']            || '';
                const tipo   = (item['Tipo'] || '').toLowerCase();
                const note   = item['Note']             || '';
                const isParziale = tipo === 'parziale';

                const statoBadge  = stato ? `<span class="badge badge-stato">${stato}</span>` : '';
                const tipoBadge   = isParziale ? `<span class="badge badge-parziale">?? parziale</span>` : '';
                const noteBlock   = note ? `
                    <div class="card-note">
                        <div class="note-label">Note</div>
                        ${note}
                    </div>` : '';

                return `
                <div class="rientro-card${isParziale ? ' parziale' : ''}">
                    <div class="card-header">
                        <div style="flex:1;">
                            <div class="card-codice">${codice}</div>
                            <div class="card-ddt">${ddt}</div>
                            <div class="card-badges" style="margin-top:8px;">${statoBadge}${tipoBadge}</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-icon btn-edit" onclick="editItem('${item.id}')">
                                <span class="material-icons-round" style="font-size:16px;">edit</span>
                            </button>
                            <button class="btn-icon btn-del" onclick="deleteItem('${item.id}')">
                                <span class="material-icons-round" style="font-size:16px;">delete</span>
                            </button>
                        </div>
                    </div>
                    ${noteBlock}
                </div>`;
            }).join('');

            document.getElementById('dataContainer').innerHTML = html;
        };

        window.openModal = function() {
            document.getElementById('editId').value = '';
            document.getElementById('dataForm').reset();
            document.getElementById('dataModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('dataModal').classList.remove('active');
        };

        window.editItem = function(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('f_Codice_consegna').value = item['Codice consegna'] || '';
            document.getElementById('f_Data_e_Num_DDT').value  = item['Data e Num DDT']  || '';
            document.getElementById('f_Stato').value           = item['Stato']            || '';
            document.getElementById('f_Tipo').value            = item['Tipo']             || '';
            document.getElementById('f_Note').value            = item['Note']             || '';
            document.getElementById('dataModal').classList.add('active');
        };

        window.deleteItem = async function(id) {
            if (confirm('Eliminare questo rientro DDT?')) {
                await deleteDoc(doc(db, ...COLL_PATH, id));
            }
        };

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                'Codice consegna': document.getElementById('f_Codice_consegna').value.trim(),
                'Data e Num DDT':  document.getElementById('f_Data_e_Num_DDT').value.trim(),
                'Stato':           document.getElementById('f_Stato').value.trim(),
                'Tipo':            document.getElementById('f_Tipo').value.trim(),
                'Note':            document.getElementById('f_Note').value.trim(),
            };
            if (id) {
                await setDoc(doc(db, ...COLL_PATH, id), data, { merge: true });
            } else {
                await addDoc(collection(db, ...COLL_PATH), data);
            }
            closeModal();
        });
    </script>
</body>
</html>
