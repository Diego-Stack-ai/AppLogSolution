name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy su Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy su Firebase Hosting
        working-directory: AppLogSolutionsWeb
        run: firebase deploy --only hosting --project log-solution-60007
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
