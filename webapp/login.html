<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Log Solution</title>
    <link rel="stylesheet" href="styles.css?v=1.8">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LogSolution">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="theme-color" content="#4f46e5">
</head>

<body class="center-content">
    <div class="glass-panel login-card">
        <div class="login-header">
            <img src="img/logo.png" alt="Log Solution" style="width: 120px; height: auto; margin-bottom: 20px;">
            <h1>Gestione Viaggi</h1>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email di Accesso</label>
                <input type="text" id="username" placeholder="esempio@logsolution.app" autocomplete="username" 
                    autocapitalize="none" autocorrect="off" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <span class="password-toggle" onclick="window.togglePasswordVisibility()">
                        <span class="material-icons-round" id="toggleIcon">visibility</span>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-bottom: 12px;">Accedi ora</button>
            <p style="font-size: 11px; color: var(--text-muted); opacity: 0.8; text-align: center; margin: 0;">
                App v1.11 &copy; 2026 Log Solution Team
            </p>
        </form>
    </div>

    <script src="script.js?v=1.8"></script>
    <script type="module" src="firebase-auth-sync.js?v=1.8"></script>
</body>
</html>
