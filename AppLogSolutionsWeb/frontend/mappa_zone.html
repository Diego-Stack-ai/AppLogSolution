        // Execute Voyage split
        function executeDividi(sourceZid) {
            const z = DATA_ZONE.find(x => x.id_zona === sourceZid);
            const selectedChecks = document.querySelectorAll('.dividi-chk:checked');
            
            if (selectedChecks.length === 0) {
                Swal.fire('Selezione Vuota', 'Seleziona almeno una fermata da dividere!', 'info');
                return;
            }

            const pHashes = Array.from(selectedChecks).map(c => c.value);
            const pointsToMove = z.lista_punti.filter(p => {
                const hash = (p.codice_frutta + "_" + p.nome).replace(/[^a-zA-Z0-9]/g, '_');
                return pHashes.includes(hash);
            });

            // Reorganize: Create Voyage/X subroute with the next available letter suffix.
            // Strip any existing _X suffix from the source to find the true base ID
            // so that splitting V01_B still generates V01_C, not V01_B_B.
            const baseId = sourceZid.replace(/_[A-Z]$/, '');

            // Find the next free letter (B, C, D, ...) by checking existing zone IDs
            const LETTERS = 'BCDEFGHIJKLMNOPQRSTUVWXYZ';
            let nextLetter = 'B';
            for (const letter of LETTERS) {
                const candidate = `${baseId}_${letter}`;
                const exactExists = DATA_ZONE.some(x => x.id_zona === candidate);
                if (!exactExists) {
                    nextLetter = letter;
                    break;
                }
            }

            const subId = `${baseId}_${nextLetter}`;
            const subColor = "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            
            // Remove points from source
            z.lista_punti = z.lista_punti.filter(p => !pointsToMove.includes(p));

            // Set new zone values on points
            pointsToMove.forEach(p => { p.zona = subId; });

            // Build the display name: strip any existing /X suffix from the base name
            // so splitting "V01/B" generates "V01/C", not "V01/B/C"
            const baseNome = (z.nome_giro || z.id_zona || 'Viaggio').replace(/\/[A-Z]$/, '');
            const newVoyage = {
                id_zona: subId,
                nome_giro: `${baseNome}/${nextLetter}`,
                color: subColor,
                lista_punti: pointsToMove
            };

            DATA_ZONE.push(newVoyage);
            _hasUnsavedChanges = true;

            cancelAction();
            updateTotals();
            if (!IS_POPUP) {
                renderMarkers();
            }
            renderSidebar();
            syncState();
            
            Swal.fire({
                icon: 'success',
                title: 'Viaggio suddiviso!',
                text: `Creato sub-percorso ${newVoyage.nome_giro}`,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2500
            });
        }

        // per-card lock/unlock toggle
        window.toggleLockZona = async (zid) => {
            const z = DATA_ZONE.find(x => x.id_zona === zid);
            if (!z) return;
            z._bloccato = !z._bloccato;
            
            renderSidebar();
            if (!IS_POPUP) {
                await renderMarkers();
            }
            syncState();
            
            // Save state immediately in background
            await window.saveToServerBackground();
        };

        // per-card calculate single voyage path
        window.calcolaGiroSingolo = async (zid) => {
            const z = DATA_ZONE.find(x => x.id_zona === zid);
            if (!z) return;
            if (z._bloccato) {
                Swal.fire('Viaggio Bloccato', 'Sblocca questo viaggio per poter calcolare il percorso!', 'warning');
                return;
            }

            const result = await Swal.fire({
                title: 'Calcola Percorso Giro',
                text: `Vuoi calcolare il percorso per il giro "${z.nome_giro || zid}"?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sì, Calcola! 🚗',
                cancelButtonText: 'Annulla'
            });
            
            if (!result.isConfirmed) return;
            
            // First save background changes so server works on latest stop list
            await window.saveToServerBackground();

            setLoaderMsg(`Ottimizzazione percorso ${z.nome_giro || zid} (OR-Tools Cloud)...`);
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-overlay').style.opacity = '1';
            
            try {
                const webCalcolaPercorsiFn = httpsCallable(functions, 'web_calcola_percorsi', { timeout: 300000 });
                const res = await webCalcolaPercorsiFn({
                    data_consegna: targetFileDate,
                    id_zona: zid,
                    aggiorna_traffico: false // Single giro calculation defaults to false for speed
                });
                
                console.log("[Calcolo Cloud Singolo] Risultato:", res.data);
                
                if (res.data && res.data.status === 'ok') {
                    await reloadVoyageData();
                    syncState();
                    Swal.fire('Percorso Calcolato', res.data.message || 'Ottimizzazione completata con successo!', 'success');
                } else {
                    throw new Error(res.data ? res.data.message : 'Risposta non valida dal server.');
                }
            } catch (err) {
                console.error("[Calcolo Cloud Singolo] Errore:", err);
                Swal.fire('Errore di Calcolo', err.message || 'Si è verificato un errore nel calcolo del percorso.', 'error');
            } finally {
                hideLoader();
            }
        };

        // Row stop reordering (up/down arrows)
        window.muoviPunto = async (zid, idx, dir) => {
            const z = DATA_ZONE.find(x => x.id_zona === zid);
            if (!z) return;
            if (z._bloccato) {
                showSaveBanner("⚠️ Questo giro è bloccato!", "var(--danger)");
                return;
            }
            const arr = z.lista_punti;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= arr.length) return;
            
            // Swap points
            [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
            
            z._stato = 'modificato';
            
            _hasUnsavedChanges = true;
            renderSidebar();
            if (!IS_POPUP) {
                await renderMarkers();
            }
            syncState();
            
            // Background save
            await window.saveToServerBackground();
        };

        // Row stop moving start (opens #sposta-overlay modal)
        let _spostaPunto = null;
        let _spostaFromZid = null;
        let _spostaPIdx = null;

        window.avviaSposta = (zid, idx) => {
            const z = DATA_ZONE.find(x => x.id_zona === zid);
            if (!z) return;
            if (z._bloccato) {
                showSaveBanner("⚠️ Questo giro è bloccato!", "var(--danger)");
                return;
            }
            _spostaPunto = z.lista_punti[idx];
            _spostaFromZid = zid;
            _spostaPIdx = idx;
            
            document.getElementById('sposta-sub-txt').textContent = `"${_spostaPunto.nome}" → scegli destinazione:`;
            
            // Filter target voyages: not current zone, not DDT_DA_INSERIRE, and not blocked
            const destinazioni = DATA_ZONE.filter(x => x.id_zona !== zid && x.id_zona !== 'DDT_DA_INSERIRE' && !x._bloccato);
            if (!destinazioni.length) {
                Swal.fire('Giri bloccati', 'Tutti gli altri viaggi sono bloccati o non disponibili. Sblocca o crea un viaggio prima di spostare.', 'warning');
                return;
            }
            
            const chips = document.getElementById('sposta-chips');
            chips.innerHTML = destinazioni.map(x => `
                <div class="sposta-chip" style="border-color: ${x.color || '#4f46e5'}" onclick="window.eseguiSposta('${x.id_zona}')">
                    <span style="color: ${x.color || '#4f46e5'}">●</span> ${x.nome_giro || x.id_zona}
                </div>
            `).join('');
            
            document.getElementById('sposta-overlay').classList.add('open');
        };

        // Row stop moving execution
        window.eseguiSposta = async (toZid) => {
            window.chiudiSposta();
            const fromZ = DATA_ZONE.find(x => x.id_zona === _spostaFromZid);
            const toZ = DATA_ZONE.find(x => x.id_zona === toZid);
            if (!fromZ || !toZ || !_spostaPunto) return;
            
            fromZ.lista_punti.splice(_spostaPIdx, 1);
            
            // Update the zone property of the point
            _spostaPunto.zona = toZid;
            toZ.lista_punti.push(_spostaPunto);
            
            fromZ._stato = 'modificato';
            toZ._stato = 'modificato';
            
            _hasUnsavedChanges = true;
            renderSidebar();
            if (!IS_POPUP) {
                await renderMarkers();
            }
            syncState();
            
            // Clean empty zones (except DDT_DA_INSERIRE)
            await pulisciZoneVuoteWeb();
            
            // Background save
            await window.saveToServerBackground();
            
            showSaveBanner(`↔ Spostato: ${_spostaPunto.nome} → ${toZ.nome_giro || toZid}`, "var(--accent)");
        };

        window.chiudiSposta = () => {
            document.getElementById('sposta-overlay').classList.remove('open');
        };

        // Clean empty zones helper
        async function pulisciZoneVuoteWeb() {
            const initialLen = DATA_ZONE.length;
            DATA_ZONE = DATA_ZONE.filter(z => z.lista_punti.length > 0 || z.id_zona === 'DDT_DA_INSERIRE');
            if (DATA_ZONE.length !== initialLen) {
                _hasUnsavedChanges = true;
            }
        }

        // Silent background save to Firebase Storage
        window.saveToServerBackground = async () => {
            try {
                const formattedVoyages = DATA_ZONE.filter(z => z.lista_punti.length > 0);
                const flatPoints = [];
                formattedVoyages.forEach(z => {
                    z.lista_punti.forEach(p => {
                        flatPoints.push(p);
                    });
                });

                const pathBase = `REPORTS/${targetFileDate}`;
                
                const jsonViaggi = JSON.stringify(formattedVoyages, null, 2);
                await uploadString(ref(storage, `${pathBase}/viaggi_giornalieri_Johnson.json`), jsonViaggi, 'raw', {
                    contentType: 'application/json'
                });

                const jsonUnificato = JSON.stringify(flatPoints, null, 2);
                await uploadString(ref(storage, `${pathBase}/punti_consegna_unificati_Johnson.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });

                await uploadString(ref(storage, `${pathBase}/punti_consegna.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });

                _hasUnsavedChanges = false;
                syncState();
                showSaveBanner("💾 SALVATO!", "var(--accent)");
            } catch (error) {
                console.error("[Storage] Errore salvataggio background:", error);
                showSaveBanner("❌ ERRORE SALVATAGGIO!", "var(--danger)");
            }
        };

        // Calculate Voyage statistics
        const VALORE_DDT = 16.50;
        function calcolaValoreZona(z) {
            let totDdt = 0;
            z.lista_punti.forEach(p => {
                totDdt += (p.codici_ddt_frutta || []).filter(c => c && c !== 'p00000').length;
                totDdt += (p.codici_ddt_latte  || []).filter(c => c && c !== 'p00000').length;
                if (!(p.codici_ddt_frutta) && !(p.codici_ddt_latte)) {
                    if (p.codice_frutta && p.codice_frutta !== 'p00000') totDdt++;
                    if (p.codice_latte  && p.codice_latte  !== 'p00000') totDdt++;
                }
            });
            return { tot_ddt: totDdt, valore: (totDdt * VALORE_DDT).toFixed(2) };
        }

        // Update global sidebar totals
        function updateTotals() {
            let totalPunti = 0;
            let totalDdt = 0;
            DATA_ZONE.forEach(z => {
                const isSpeciale = (z.id_zona === 'DDT_DA_INSERIRE');
                if (VIEW_MODE_PULITA && isSpeciale) return;
                totalPunti += z.lista_punti.length;
                totalDdt += calcolaValoreZona(z).tot_ddt;
            });
            document.getElementById('stat-punti').textContent = `${totalPunti} Fermate totali`;
            document.getElementById('stat-ddt').textContent = `${totalDdt} DDT attivi`;
        }

        // Toggle verification mode (hides unassigned anomalies to show final routes)
        window.toggleVerificaViaggi = () => {
            VIEW_MODE_PULITA = !VIEW_MODE_PULITA;
            const btn = document.getElementById('btn-verifica');
            if (VIEW_MODE_PULITA) {
                btn.classList.add('active');
                btn.innerHTML = '<span class="material-icons-round">fact_check</span> VISTA PULITA ON';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<span class="material-icons-round">fact_check</span> VERIFICA VIAGGI (Vista Completa)';
            }
            if (!IS_POPUP) {
                renderMarkers();
            }
            renderSidebar();
            updateTotals();
            syncState();
        };

        // Save All Changes to Firebase Storage
        window.saveAllToServer = async () => {
            Swal.fire({
                title: 'Salvataggio in corso...',
                text: 'Upload dei file logistici in Firebase Storage...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                // Filter out empty zones for the official viaggi JSON
                const formattedVoyages = DATA_ZONE.filter(z => z.lista_punti.length > 0);
                
                // Reconstruct the flat list of points
                const flatPoints = [];
                formattedVoyages.forEach(z => {
                    z.lista_punti.forEach(p => {
                        flatPoints.push(p);
                    });
                });

                const pathBase = `REPORTS/${targetFileDate}`;
                
                // 1. Save viaggi_giornalieri_Johnson.json
                const jsonViaggi = JSON.stringify(formattedVoyages, null, 2);
                await uploadString(ref(storage, `${pathBase}/viaggi_giornalieri_Johnson.json`), jsonViaggi, 'raw', {
                    contentType: 'application/json'
                });

                // 2. Save punti_consegna_unificati_Johnson.json
                const jsonUnificato = JSON.stringify(flatPoints, null, 2);
                await uploadString(ref(storage, `${pathBase}/punti_consegna_unificati_Johnson.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });

                // 3. Save punti_consegna.json
                await uploadString(ref(storage, `${pathBase}/punti_consegna.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });

                _hasUnsavedChanges = false;
                syncState();
                Swal.close();
                
                // Show floating banner
                showSaveBanner("💾 SALVATAGGIO COMPLETATO!", "var(--accent)");

                Swal.fire({
                    title: 'Successo!',
                    text: 'I viaggi e le coordinate sono stati salvati correttamente nello Storage.',
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false
                });

            } catch (error) {
                console.error("[Storage] Errore durante il salvataggio globale:", error);
                Swal.fire('Errore Salvataggio', `Impossibile salvare i file sullo Storage: ${error.message}`, 'error');
            }
        };

        // Utility: Show floating success banner
        function showSaveBanner(text, bgColor) {
            const banner = document.getElementById('save-status');
            const textEl = document.getElementById('save-status-text');
            banner.style.background = bgColor || 'var(--accent)';
            textEl.textContent = text;
            banner.classList.add('show');
            setTimeout(() => {
                banner.classList.remove('show');
            }, 3500);
        }

        window.aggiornaModificati = async () => {
            const modificati = DATA_ZONE.filter(z => z._stato === 'modificato').map(z => z.id_zona);
            if (!modificati.length) {
                Swal.fire('Nessun Giro', 'Nessun giro modificato da aggiornare.', 'info');
                return;
            }

            try {
                const overlay = document.getElementById('loading-overlay');
                if (overlay) { overlay.style.display = 'flex'; overlay.style.opacity = '1'; }
                setLoaderMsg("Aggiornamento modificati in corso... (Salto ottimizzazione)");
                
                const functions = getFunctions(app, "europe-west1");
                const webCalcolaPercorsiFn = httpsCallable(functions, 'web_calcola_percorsi', { timeout: 300000 });
                const res = await webCalcolaPercorsiFn({
                    data_consegna: targetFileDate,
                    target_zones: modificati,
                    aggiorna_traffico: false,
                    usa_or_tools: false // The magic flag!
                });

                if (res.data && res.data.status === 'ok') {
                    // Update frontend state with calculated data by reloading from cloud
                    await reloadVoyageData();
                    syncState();
                    Swal.fire('Aggiornamento Completato', `Orari e mappa aggiornati per ${modificati.length} giri (mantenendo ordine manuale).`, 'success');
                } else {
                    throw new Error(res.data ? res.data.message : 'Risposta non valida dal server.');
                }
            } catch (err) {
                console.error("[Aggiorna Modificati] Errore:", err);
                Swal.fire('Errore di Calcolo', err.message || 'Si è verificato un errore nel calcolo del percorso.', 'error');
            } finally {
                hideLoader();
            }
        };

        // Cloud-based voyage path optimization trigger (OR-Tools Cloud Function)
        window.calcolaPercorsi = async () => {
            
            // Confirm traffic updates
            const result = await Swal.fire({
                title: 'Calcola Percorsi',
                text: 'Vuoi includere gli aggiornamenti del traffico serale (ottimizzazione avanzata)?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sì, usa Traffico 🚗',
                cancelButtonText: 'No, solo percorso base 📍',
                denyButtonText: 'Annulla',
                showDenyButton: true
            });
            
            if (result.isDenied || (!result.isConfirmed && result.dismiss === Swal.DismissReason.backdrop)) {
                return; // user cancelled/denied
            }
            
            const aggiornaTraffico = result.isConfirmed;
            
            // First save background changes so server works on latest stop list and lock statuses
            await window.saveToServerBackground();
            
            setLoaderMsg("Ottimizzazione percorsi in corso (OR-Tools Cloud)...");
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-overlay').style.opacity = '1';
            
            try {
                const webCalcolaPercorsiFn = httpsCallable(functions, 'web_calcola_percorsi', { timeout: 540000 });
                const res = await webCalcolaPercorsiFn({
                    data_consegna: targetFileDate,
                    aggiorna_traffico: aggiornaTraffico
                });
                
                console.log("[Calcolo Cloud] Risultato:", res.data);
                
                if (res.data && res.data.status === 'ok') {
                    await reloadVoyageData();
                    syncState();
                    Swal.fire('Percorsi Calcolati', res.data.message || 'Ottimizzazione completata con successo!', 'success');
                } else {
                    throw new Error(res.data ? res.data.message : 'Risposta non valida dal server.');
                }
            } catch (err) {
                console.error("[Calcolo Cloud] Errore:", err);
                Swal.fire('Errore di Calcolo', err.message || 'Si è verificato un errore nel calcolo dei percorsi.', 'error');
            } finally {
                hideLoader();
            }
        };

        // Cloud-based document generation trigger (BAT 5, 6, 7B Cloud Function)
        window.apriPopupGenerazione = async () => {
            // --- CONTROLLO NOMI VALIDI ---
            const nomiErrati = [];
            DATA_ZONE.forEach(z => {
                if (z.id_zona === 'DDT_DA_INSERIRE' || z.lista_punti.length === 0) return;
                
                const isGC = (z.id_zona || '').startsWith('GranChef') || (z.nome_giro || '').startsWith('GranChef') || (z._stats && z._stats.is_gc === true) || (z.id_zona && z.id_zona.includes('GranChef'));
                const nomiAmmessi = getNomiViaggi(isGC);
                const nomeAttuale = z.nome_giro || z.id_zona;
                
                if (!nomiAmmessi.includes(nomeAttuale)) {
                    nomiErrati.push({ giro: nomeAttuale, cliente: isGC ? 'Gran Chef' : 'DNR' });
                }
            });

            if (nomiErrati.length > 0) {
                const listaHtml = nomiErrati.map(err => `<li><b>${err.giro}</b> <span style="color:#666;font-size:0.9em;">(${err.cliente})</span></li>`).join('');
                Swal.fire({
                    icon: 'error',
                    title: 'Nomi Viaggio non validi!',
                    html: `I seguenti viaggi hanno nomi non presenti nella lista ufficiale in Impostazioni:<br><br><ul style="text-align:left; color:#ef4444;">${listaHtml}</ul><br><b>Rinomina questi viaggi</b> scegliendo un nome dalla tendina, oppure inserendoli a mano per sbloccare il salvataggio.`,
                    confirmButtonText: 'Ho capito',
                    confirmButtonColor: '#ef4444'
                });
                return;
            }
            // --- FINE CONTROLLO ---

            const result = await Swal.fire({
                title: 'Salva e Genera File',
                text: 'Procedere con il salvataggio dei percorsi correnti e l\'elaborazione automatica di PDF, mappe mobile e link viaggi in cloud?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sì, Genera tutto! 🚀',
                cancelButtonText: 'Annulla'
            });
            
            if (!result.isConfirmed) return;
            
            Swal.fire({
                title: 'Salvataggio in corso...',
                text: 'Upload dei file logistici in Firebase Storage...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            
            try {
                // Filter out empty zones
                const formattedVoyages = DATA_ZONE.filter(z => z.lista_punti.length > 0);
                const flatPoints = [];
                formattedVoyages.forEach(z => {
                    z.lista_punti.forEach(p => {
                        flatPoints.push(p);
                    });
                });
                
                const pathBase = `REPORTS/${targetFileDate}`;
                
                // 1. Save viaggi_giornalieri_Johnson.json
                const jsonViaggi = JSON.stringify(formattedVoyages, null, 2);
                await uploadString(ref(storage, `${pathBase}/viaggi_giornalieri_Johnson.json`), jsonViaggi, 'raw', {
                    contentType: 'application/json'
                });
                
                // 2. Save punti_consegna_unificati_Johnson.json
                const jsonUnificato = JSON.stringify(flatPoints, null, 2);
                await uploadString(ref(storage, `${pathBase}/punti_consegna_unificati_Johnson.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });
                
                // 3. Save punti_consegna.json
                await uploadString(ref(storage, `${pathBase}/punti_consegna.json`), jsonUnificato, 'raw', {
                    contentType: 'application/json'
                });
                
                _hasUnsavedChanges = false;
                syncState();
                
                // Step 2: Generazione Cloud
                Swal.update({
                    title: 'Generazione in corso...',
                    text: 'Creazione PDF distinte, Master PDF e mappe mobile in cloud (BAT 5, 6, 7B)...'
                });
                
                const generaCompletoFn = httpsCallable(functions, 'genera_completo_giornata', { timeout: 300000 });
                const res = await generaCompletoFn({
                    data_consegna: targetFileDate
                });
                
                console.log("[Generazione Cloud] Risultato:", res.data);
                
                if (res.data && res.data.status === 'ok') {
                    Swal.fire({
                        title: 'Generazione Completata!',
                        text: res.data.message || 'Tutti i file sono stati generati con successo in Storage.',
                        icon: 'success',
                        confirmButtonText: 'Vai ai Link Viaggi 🔗'
                    }).then(() => {
                        window.location.href = `link_viaggi.html?data=${targetFileDate}`;
                    });
                } else {
                    throw new Error(res.data ? res.data.message : 'Risposta non valida dal server.');
                }
            } catch (error) {
                console.error("[Generazione Cloud] Errore:", error);
                Swal.fire('Errore di Generazione', `Impossibile completare la pipeline in cloud: ${error.message}`, 'error');
            }
        };

        // Initialize script
        initApp();
    </script>

    <!-- MODAL RINOMINA -->
    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" id="modal-title">✏️ Rinomina giro</div>
            <div class="modal-sub" id="modal-sub"></div>
            <select id="modal-select" onchange="onSelectChange()">
                <option value="">— Seleziona nome —</option>
            </select>
            <input id="modal-input" type="text" placeholder="Oppure scrivi nome personalizzato…">
            <div class="modal-btns">
                <button class="modal-ok" onclick="salvaRinomina()">Salva</button>
                <button class="modal-cancel" onclick="chiudiModal()">Annulla</button>
            </div>
        </div>
    </div>

    <!-- SPOSTA OVERLAY -->
    <div id="sposta-overlay">
        <div class="sposta-box">
            <div class="sposta-title">↔ Sposta consegna</div>
            <div class="sposta-sub" id="sposta-sub-txt"></div>
            <div class="sposta-chips" id="sposta-chips"></div>
            <button class="sposta-cancel" onclick="window.chiudiSposta()">Annulla</button>
        </div>
    </div>
</body>
</html>
