<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Anagrafiche - Log Solution</title>
    <link rel="stylesheet" href="styles.css?v=1.51">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        .tabs-header {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .data-table-container {
            overflow-x: auto;
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            max-height: 70vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 12px 16px;
            font-weight: 700;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-main);
            white-space: nowrap;
        }

        /* Forza larghezza minima per colonne importanti */
        th:nth-child(3), td:nth-child(3) { min-width: 200px; white-space: normal; } /* Nome Consegna */
        th:nth-child(4), td:nth-child(4) { min-width: 250px; white-space: normal; } /* Indirizzo */
        th:nth-child(8), td:nth-child(8) { min-width: 120px; } /* Lat/Lon */
        th:nth-child(9), td:nth-child(9) { min-width: 150px; } /* Orari */

        tr:hover td {
            background: #f8fafc;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-frutta { background: #dcfce7; color: #166534; }
        .badge-latte { background: #e0f2fe; color: #075985; }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        /* Card Layout */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .item-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .item-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 25px -10px rgba(79, 70, 229, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .card-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
            margin: 0;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .card-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .data-value {
            font-size: 13px;
            font-weight: 500;
        }

        .card-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: var(--primary-glow);
            color: var(--primary);
        }

        /* Scrollbar personalizzata */
        .data-table-container::-webkit-scrollbar {
            height: 8px;
            display: block;
        }
    </style>
</head>

<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <button onclick="window.navigateWithState('dashboard.html')" class="logout-btn" style="border:none; background:none; cursor:pointer; margin-right:8px; display:flex;">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <div class="nav-title" style="flex: 1;">Gestione Anagrafiche</div>
            <a href="#" onclick="window.logoutFirebase(); return false;" class="logout-btn"><span class="material-icons-round">logout</span></a>
        </div>
    </nav>

    <main class="main-container">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="switchTab('clienti')">
                <span class="material-icons-round">group</span> Clienti
            </button>
            <button class="tab-btn" onclick="switchTab('articoli')">
                <span class="material-icons-round">inventory_2</span> Articoli
            </button>
            <button class="tab-btn" onclick="switchTab('rientri')">
                <span class="material-icons-round">assignment_return</span> Rientri DDT
            </button>
        </div>

        <div class="glass-panel" style="padding: 24px;">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cerca..." onkeyup="filterTable()">
                <button class="btn-add" onclick="openModal()">
                    <span class="material-icons-round">add</span> Aggiungi
                </button>
            </div>

            <div id="dataContainer" class="cards-container">
                <!-- Card dinamiche -->
            </div>
            
            <div id="loading" style="text-align: center; padding: 40px; color: var(--text-muted);">
                <span class="material-icons-round" style="font-size: 40px; animation: spin 2s linear infinite;">autorenew</span>
                <p>Caricamento dati...</p>
            </div>
        </div>
    </main>

    <!-- Modale Aggiunta/Modifica -->
    <div id="crudModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modalTitle" style="margin: 0;">Aggiungi Nuovo</h3>
                <button onclick="closeModal()" style="border: none; background: none; cursor: pointer; color: var(--text-muted);">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
            
            <form id="crudForm">
                <div id="formFields" class="form-grid">
                    <!-- Campi dinamici basati sul tab attivo -->
                </div>
                
                <div style="margin-top: 32px; display: flex; gap: 12px;">
                    <button type="button" onclick="closeModal()" class="tab-btn" style="flex: 1; justify-content: center;">Annulla</button>
                    <button type="submit" class="btn-primary" style="flex: 2; box-shadow: none;">Salva nel Database</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js?v=1.51"></script>
    <script type="module" src="firebase-auth-sync.js?v=1.51"></script>
    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = getApps().length > 0 ? getApps()[0] : initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTab = 'clienti';
        let unsubscribe = null;

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tab));
            });
            loadData();
        };

        function loadData() {
            if(unsubscribe) unsubscribe();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dataContainer').innerHTML = '';
            
            let collPath = '';
            if(currentTab === 'clienti') collPath = 'customers/DNR/clienti';
            if(currentTab === 'articoli') collPath = 'customers/DNR/anagrafica_articoli';
            if(currentTab === 'rientri') collPath = 'customers/DNR/rientri_ddt';

            const q = query(collection(db, collPath));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                document.getElementById('loading').style.display = 'none';
                window.fullData = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderTable(window.fullData);
            });
        }

        function renderTable(data) {
            const container = document.getElementById('dataContainer');
            container.innerHTML = '';
            
            if(currentTab === 'clienti') {
                container.innerHTML = data.map(d => `
                    <div class="item-card">
                        <div class="card-header">
                            <div>
                                <h4 class="card-title">${d.cliente || d.nome_consegna || 'N/A'}</h4>
                                <div style="display:flex; gap:8px; margin-top:4px;">
                                    <span class="badge badge-frutta">F: ${d.codice_frutta || '-'}</span>
                                    <span class="badge badge-latte">L: ${d.codice_latte || '-'}</span>
                                    <span class="badge" style="background:#f1f5f9; color:#64748b">ZONA: ${d.codice_zona || d.zona || '-'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="card-row">
                                <div class="data-item" style="flex:2">
                                    <span class="data-label">Indirizzo</span>
                                    <span class="data-value">${d.indirizzo || ''}</span>
                                </div>
                                <div class="data-item" style="flex:1">
                                    <span class="data-label">Città / Prov</span>
                                    <span class="data-value">${d.citta || ''} (${d.provincia || d.prov || '-'})</span>
                                </div>
                            </div>
                            <div class="card-row" style="background:#f8fafc; padding:8px; border-radius:8px;">
                                <div class="data-item">
                                    <span class="data-label">Orari Frutta</span>
                                    <span class="data-value">${d.orario_min_frutta || '-'}/${d.orario_max_frutta || '-'}</span>
                                </div>
                                <div class="data-item" style="border-left:1px solid #e2e8f0; padding-left:16px;">
                                    <span class="data-label">Orari Latte</span>
                                    <span class="data-value">${d.orario_min_latte || '-'}/${d.orario_max_latte || '-'}</span>
                                </div>
                                <div class="data-item" style="border-left:1px solid #e2e8f0; padding-left:16px;">
                                    <span class="data-label">Coordinate GPS</span>
                                    <span class="data-value">${d.lat ? parseFloat(d.lat).toFixed(4) : '-'}/${d.lon ? parseFloat(d.lon).toFixed(4) : '-'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions">
                             <button class="btn-edit" onclick="editItem('${d.id}')">
                                <span class="material-icons-round" style="font-size:18px;">edit</span>
                             </button>
                        </div>
                    </div>
                `).join('');
            } else if(currentTab === 'articoli') {
                container.innerHTML = data.map(d => `
                    <div class="item-card">
                        <div class="card-header">
                            <div>
                                <h4 class="card-title">${d.id}</h4>
                                <p style="font-size:12px; color:var(--text-muted); margin:0;">${d.descrizione || ''}</p>
                            </div>
                            <span class="badge" style="background:var(--primary-glow); color:var(--primary)">x ${d.ratio || '1'}</span>
                        </div>
                        <div class="card-body">
                            <div class="card-row">
                                <div class="data-item">
                                    <span class="data-label">Confezionamento</span>
                                    <span class="data-value">${d.unita_principale || '-'}</span>
                                </div>
                                <div class="data-item">
                                    <span class="data-label">Unità Secondaria</span>
                                    <span class="data-value">${d.unita_secondaria || '-'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions">
                             <button class="btn-edit" onclick="editItem('${d.id}')">
                                <span class="material-icons-round" style="font-size:18px;">edit</span>
                             </button>
                        </div>
                    </div>
                `).join('');
            } else if(currentTab === 'rientri') {
                 container.innerHTML = data.map(d => `
                    <div class="item-card">
                        <div class="card-header">
                            <div>
                                <h4 class="card-title">${d.codice_consegna || d.id}</h4>
                                <p style="font-size:12px; color:var(--text-muted); margin:0;">Data DDT: ${d.data_ddt || ''}</p>
                            </div>
                            <span class="badge badge-frutta">${d.stato || ''}</span>
                        </div>
                        <div class="card-body">
                            <div class="data-item">
                                <span class="data-label">Note</span>
                                <span class="data-value">${d.note || '-'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- GESTIONE CRUD MODALE ---
        window.openModal = function() {
            const modal = document.getElementById('crudModal');
            const title = document.getElementById('modalTitle');
            const fields = document.getElementById('formFields');
            const form = document.getElementById('crudForm');
            
            form.reset();
            modal.classList.add('active');
            
            if(currentTab === 'clienti') {
                title.innerText = "Nuovo Cliente";
                fields.innerHTML = `
                    <div class="input-group">
                        <label>Codice Frutta</label>
                        <input type="text" name="codice_frutta" placeholder="es: p2000">
                    </div>
                    <div class="input-group">
                        <label>Codice Latte</label>
                        <input type="text" name="codice_latte" placeholder="es: p2000">
                    </div>
                    <div class="input-group" style="grid-column: span 2">
                        <label>Nome Consegna (Scuola)</label>
                        <input type="text" name="cliente" required>
                    </div>
                    <div class="input-group" style="grid-column: span 2">
                        <label>Indirizzo</label>
                        <input type="text" name="indirizzo">
                    </div>
                    <div class="input-group">
                        <label>Città</label>
                        <input type="text" name="citta">
                    </div>
                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="provincia" maxlength="2">
                    </div>
                    <div class="input-group">
                        <label>Zona (Giro)</label>
                        <input type="text" name="codice_zona" placeholder="es: PD1">
                    </div>
                    <div class="input-group">
                        <label>Latitudine</label>
                        <input type="text" name="lat">
                    </div>
                    <div class="input-group">
                        <label>Longitudine</label>
                        <input type="text" name="lon">
                    </div>
                    <div class="input-group">
                        <label>Orario Min Frutta</label>
                        <input type="text" name="orario_min_frutta" placeholder="08:00">
                    </div>
                    <div class="input-group">
                        <label>Orario Max Frutta</label>
                        <input type="text" name="orario_max_frutta" placeholder="10:00">
                    </div>
                    <div class="input-group">
                        <label>Orario Min Latte</label>
                        <input type="text" name="orario_min_latte" placeholder="08:00">
                    </div>
                    <div class="input-group">
                        <label>Orario Max Latte</label>
                        <input type="text" name="orario_max_latte" placeholder="10:00">
                    </div>
                `;
            } else if(currentTab === 'articoli') {
                title.innerText = "Nuovo Articolo";
                fields.innerHTML = `
                    <div class="input-group">
                        <label>Codice Articolo</label>
                        <input type="text" name="id" required placeholder="es: AL-T-LI-NA">
                    </div>
                    <div class="input-group" style="grid-column: span 2">
                        <label>Descrizione</label>
                        <input type="text" name="descrizione">
                    </div>
                    <div class="input-group">
                        <label>Unità Principale (Confezionamento)</label>
                        <input type="text" name="unita_principale" placeholder="es: Cartoni">
                    </div>
                    <div class="input-group">
                        <label>Ratio (Pezzi per Unità)</label>
                        <input type="number" name="ratio" value="1">
                    </div>
                    <div class="input-group">
                        <label>Unità Secondaria</label>
                        <input type="text" name="unita_secondaria" placeholder="es: Porzioni">
                    </div>
                `;
            } else {
                title.innerText = "Nuovo Rientro";
                fields.innerHTML = `
                    <div class="input-group">
                        <label>Codice Consegna</label>
                        <input type="text" name="codice_consegna" required>
                    </div>
                    <div class="input-group">
                        <label>Data DDT</label>
                        <input type="date" name="data_ddt">
                    </div>
                    <div class="input-group">
                        <label>Stato</label>
                        <select name="stato">
                            <option value="rientrato">Rientrato</option>
                            <option value="mancante">Mancante</option>
                        </select>
                    </div>
                `;
            }
        };

        window.closeModal = () => document.getElementById('crudModal').classList.remove('active');

        document.getElementById('crudForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                let collPath = '';
                let docId = null;
                
                if(currentTab === 'clienti') {
                    collPath = 'customers/DNR/clienti';
                    docId = data.codice_frutta || data.codice_latte || null;
                } else if(currentTab === 'articoli') {
                    collPath = 'customers/DNR/anagrafica_articoli';
                    docId = data.id;
                    delete data.id;
                } else {
                    collPath = 'customers/DNR/rientri_ddt';
                }

                // Import dynamically to use the common firestore service if possible, or direct
                const { doc, setDoc, collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                
                if(docId) {
                    await setDoc(doc(db, collPath, docId), data, { merge: true });
                } else {
                    await addDoc(collection(db, collPath), data);
                }
                
                alert("Salvataggio completato con successo!");
                closeModal();
            } catch (err) {
                console.error("Errore salvataggio:", err);
                alert("Errore durante il salvataggio: " + err.message);
            }
        });

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = (window.fullData || []).filter(d => {
                const text = JSON.stringify(d).toLowerCase();
                return text.includes(q);
            });
            renderTable(filtered);
        }

        window.editItem = function(id) {
            const item = (window.fullData || []).find(d => d.id === id);
            if(!item) return;
            
            // Riutilizziamo openModal per caricare i dati
            openModal();
            const form = document.getElementById('crudForm');
            const title = document.getElementById('modalTitle');
            title.innerText = "Modifica Record";
            
            // Popolamento automatico campi
            Object.keys(item).forEach(key => {
                const input = form.querySelector(`[name="${key}"]`);
                if(input) input.value = item[key];
            });
            
            // Caso speciale per ID articolo
            if(currentTab === 'articoli') {
                const idInput = form.querySelector('[name="id"]');
                if(idInput) {
                    idInput.value = item.id;
                    idInput.readOnly = true;
                }
            }
        };

        loadData();
    </script>
</body>
</html>
