<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Viaggi - Log Solution</title>
    <link rel="stylesheet" href="styles.css?v=2.30">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="theme-color" content="#4f46e5">
    <style>
        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .page-title-group h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title-group p {
            margin: 4px 0 0 0;
            color: var(--text-muted);
            font-size: 15px;
        }

        .controls-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: var(--surface);
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            flex-wrap: wrap;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .date-selector-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .date-selector-group label {
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }

        .date-selector-wrapper {
            position: relative;
            min-width: 180px;
        }

        .date-selector-wrapper select {
            padding: 12px 16px;
            padding-right: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-refresh:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: translateY(-2px);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .btn-refresh .material-icons-round {
            font-size: 18px;
            transition: transform 0.6s ease;
        }

        .btn-refresh.spinning .material-icons-round {
            animation: spin 0.8s linear infinite;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .link-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), #a855f7);
            opacity: 0.8;
        }

        .link-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-focus);
            box-shadow: 0 20px 40px -15px var(--primary-glow);
            background: white;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .giro-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .giro-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(168, 85, 247, 0.1));
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .giro-icon .material-icons-round {
            font-size: 22px;
        }

        .giro-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .date-badge {
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .zones-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .zones-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .zone-pill {
            background: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-copy:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--primary-glow);
        }

        .btn-copy.copied {
            background: var(--success);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-open {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-open:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        /* Loading and Empty State */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            gap: 16px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 500px;
            margin: 40px auto;
        }

        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon.warn-icon {
            background: rgba(239, 68, 68, 0.08);
            color: var(--danger);
        }

        .status-icon .material-icons-round {
            font-size: 36px;
        }

        .status-container h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .status-container p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(79, 70, 229, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Back to Dashboard Nav Item */
        .btn-back-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--border);
        }

        .btn-back-nav:hover {
            color: var(--primary);
            background: white;
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <img src="img/logo.png" alt="LS" style="height: 32px; width: auto; margin-right: 8px;">
            <button id="dashboardBtn" class="logout-btn" title="Dashboard"
                onclick="window.navigateWithState('dashboard.html')"
                style="border:none; background:none; cursor:pointer; margin-right:8px; display:flex;">
                <span class="material-icons-round">dashboard</span>
            </button>
            <div class="nav-title" style="flex: 1;">Link Viaggi Autisti</div>
            <a href="login.html" class="logout-btn" title="Esci"><span class="material-icons-round">logout</span></a>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <div class="page-title-group">
                <h1>Mappe Mobile per Autisti</h1>
                <p>Copia i link di tracciamento e inviali agli autisti tramite WhatsApp</p>
            </div>
        </div>

        <div class="controls-panel" id="controlsPanel" style="display: none;">
            <div class="date-selector-group">
                <label for="dateSelect">
                    <span class="material-icons-round" style="color: var(--primary);">calendar_today</span>
                    Seleziona Data Viaggio:
                </label>
                <div class="date-selector-wrapper">
                    <select id="dateSelect" onchange="window.onDateChanged()">
                        <!-- Caricato dinamicamente -->
                    </select>
                </div>
            </div>
            <button class="btn-refresh" id="refreshBtn" onclick="window.refreshManifest()">
                <span class="material-icons-round">sync</span>
                Aggiorna Dati
            </button>
        </div>

        <!-- Area di Stato: Loading, Errore o Griglia dei Link -->
        <div id="statusArea">
            <div class="status-container">
                <div class="spinner"></div>
                <h3>Caricamento in corso...</h3>
                <p>Sto leggendo l'indice delle mappe attive dal server.</p>
            </div>
        </div>

        <div class="links-grid" id="linksGrid" style="display: none;">
            <!-- Caricato dinamicamente -->
        </div>
    </main>

    <script src="script.js?v=2.30"></script>
    <script type="module" src="firebase-auth-sync.js?v=2.30"></script>
    
    <script type="module">
        import { auth } from "./firestore-service.js?v=2.30";

        let allLinks = [];
        let datesGrouped = {};
        let linksLoaded = false;

        // Inizializzazione al caricamento del profilo utente
        window.onUserProfileLoaded = function(user) {
            if (linksLoaded) return;
            linksLoaded = true;
            loadLinks();
        };

        // Caricamento dei link dal manifest statico
        async function loadLinks(forceRefresh = false) {
            const statusArea = document.getElementById('statusArea');
            const linksGrid = document.getElementById('linksGrid');
            const controlsPanel = document.getElementById('controlsPanel');
            const refreshBtn = document.getElementById('refreshBtn');

            if (forceRefresh) {
                refreshBtn.classList.add('spinning');
            }

            try {
                // Aggiunge cache-buster per saltare la cache CDN in caso di refresh esplicito
                const cacheBuster = forceRefresh ? `?t=${Date.now()}` : `?v=${window.APP_VERSION}`;
                const response = await fetch(`./mappe_autisti/manifest_link_viaggi.json${cacheBuster}`);
                
                if (!response.ok) {
                    throw new Error("Impossibile trovare il manifest dei link.");
                }

                const data = await response.json();
                allLinks = data.links || [];

                if (allLinks.length === 0) {
                    showEmptyState("Nessun link attivo trovato", "Non è stata generata alcuna mappa degli autisti negli ultimi 10 giorni. Esegui la pipeline locale per pubblicarle.");
                    return;
                }

                // Raggruppa i link per data
                datesGrouped = {};
                allLinks.forEach(link => {
                    if (!datesGrouped[link.date]) {
                        datesGrouped[link.date] = [];
                    }
                    datesGrouped[link.date].push(link);
                });

                // Ordina le date in ordine decrescente
                const sortedDates = Object.keys(datesGrouped).sort((a, b) => {
                    const dateA = new Date(a.split('-').reverse().join('-'));
                    const dateB = new Date(b.split('-').reverse().join('-'));
                    return dateB - dateA;
                });

                // Popola il selettore date
                const dateSelect = document.getElementById('dateSelect');
                dateSelect.innerHTML = '';
                sortedDates.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d;
                    option.textContent = d;
                    dateSelect.appendChild(option);
                });

                // Mostra i controlli e nasconde il loader
                statusArea.style.display = 'none';
                controlsPanel.style.display = 'flex';
                linksGrid.style.display = 'grid';

                // Renderizza i link della prima data disponibile
                if (sortedDates.length > 0) {
                    renderLinksForDate(sortedDates[0]);
                }

            } catch (error) {
                console.error("Errore caricamento link:", error);
                showEmptyState(
                    "Mappe Autisti non pronte",
                    "Il server non ha ancora un indice delle mappe attive. Assicurati di aver avviato almeno una volta il programma locale <b>6_AVVIA_MOBILE_AUTISTI.bat</b> e di aver eseguito con successo il deploy.",
                    true
                );
            } finally {
                refreshBtn.classList.remove('spinning');
            }
        }

        // Renderizza le card dei viaggi per la data selezionata
        function renderLinksForDate(date) {
            const linksGrid = document.getElementById('linksGrid');
            linksGrid.innerHTML = '';

            const links = datesGrouped[date] || [];

            links.forEach((link, idx) => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.style.animationDelay = `${idx * 0.05}s`;

                // Abbreviazione e formattazione delle zone coperte
                const zonesHtml = link.zones.map(z => `<span class="zone-pill">${z}</span>`).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="giro-info">
                            <div class="giro-icon">
                                <span class="material-icons-round">local_shipping</span>
                            </div>
                            <div>
                                <div class="giro-name">Giro ${link.v_id}</div>
                                <div style="font-size: 13px; color: var(--text-muted); font-weight: 500;">Zone coperte: ${link.zones.length}</div>
                            </div>
                        </div>
                        <span class="date-badge">${link.date}</span>
                    </div>
                    <div class="card-content">
                        <h4 class="zones-label">Elenco Zone</h4>
                        <div class="zones-container">
                            ${zonesHtml}
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action btn-copy" onclick="window.copyToClipboard('${link.url}', this)">
                            <span class="material-icons-round">content_copy</span>
                            <span>Copia Link</span>
                        </button>
                        <a href="${link.url}" target="_blank" class="btn-action btn-open">
                            <span class="material-icons-round">open_in_new</span>
                            <span>Apri</span>
                        </a>
                    </div>
                `;
                linksGrid.appendChild(card);
            });
        }

        // Gestione cambio data nel selettore
        window.onDateChanged = function() {
            const selectedDate = document.getElementById('dateSelect').value;
            renderLinksForDate(selectedDate);
        };

        // Aggiorna manifest bypassando cache
        window.refreshManifest = function() {
            loadLinks(true);
            Swal.fire({
                icon: 'success',
                title: 'Dati Aggiornati!',
                text: 'Ho ricaricato la lista dei link disponibili direttamente dal server.',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2500,
                timerProgressBar: true
            });
        };

        // Copia il link negli appunti con animazione del pulsante
        window.copyToClipboard = async function(text, buttonElement) {
            try {
                await navigator.clipboard.writeText(text);
                
                // Animazione pulsante successo
                const icon = buttonElement.querySelector('.material-icons-round');
                const textSpan = buttonElement.querySelector('span:not(.material-icons-round)');
                
                buttonElement.classList.add('copied');
                icon.textContent = 'check';
                textSpan.textContent = 'Copiato!';
                
                // Ripristino dopo 2 secondi
                setTimeout(() => {
                    buttonElement.classList.remove('copied');
                    icon.textContent = 'content_copy';
                    textSpan.textContent = 'Copia Link';
                }, 2000);

            } catch (err) {
                console.error('Impossibile copiare il link negli appunti: ', err);
                
                // Fallback SweetAlert in caso di blocco del browser
                Swal.fire({
                    title: 'Copia il link manualmente',
                    html: `<input type="text" value="${text}" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight:600;" readonly onclick="this.select()">`,
                    confirmButtonText: 'Chiudi',
                    confirmButtonColor: 'var(--primary)'
                });
            }
        };

        // Mostra schermata vuota/errore
        function showEmptyState(title, description, isWarning = false) {
            const statusArea = document.getElementById('statusArea');
            const linksGrid = document.getElementById('linksGrid');
            const controlsPanel = document.getElementById('controlsPanel');

            controlsPanel.style.display = 'none';
            linksGrid.style.display = 'none';
            statusArea.style.display = 'block';

            statusArea.innerHTML = `
                <div class="status-container">
                    <div class="status-icon ${isWarning ? 'warn-icon' : ''}">
                        <span class="material-icons-round">${isWarning ? 'warning_amber' : 'share_location'}</span>
                    </div>
                    <h3>${title}</h3>
                    <p>${description}</p>
                </div>
            `;
        }
    </script>
</body>

</html>
